<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Aurora 📽️ - Registro</title>
    <meta name="description" content="Cine Aurora - Registro" />
    <link rel="icon" href="../assets/favicon/peli.png" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header>
      <div class="logo">
        <h1>Cine Aurora</h1>
        <img src="../assets/favicon/vaso2.png" alt="logo-cine-aurora" />
        <img src="../assets/favicon/peli.png" alt="logo-cine-aurora" />
        <img src="../assets/favicon/vaso2.png" alt="logo-cine-aurora" />
        
      </div>
      <div>
        <nav>
          <a href="../index.html">Inicio</a>
          <a href="./estrenos.html">Próximos estrenos</a>
          <a href="../index.html">Volver</a>
        </nav>
      </div>
    </header>

    <main>
      <div>
        <form class="form-registro" action="login.html">
          <h2>Crear nueva cuenta</h2>
          <div class="form-grupo">
            <label>Nombre Completo</label>
            <input type="text" required />
          </div>
          <div class="form-grupo">
            <label>Email</label>
            <input type="email" required />
          </div>
          <div class="form-grupo">
            <label>Fecha de nacimiento</label>
            <input type="date" required />
          </div>
          <div class="form-grupo">
            <label>Contraseña</label>
            <input type="password" required />
          </div>

          <div class="form-grupo">
            <label>Confirmar contraseña</label>
            <input type="password" required />
          </div>

          <hr />

          <div>
            <div>
              <h3>Datos para ayudar al cine</h3>
              <p>Estos datos nos ayudan a mejorar tu experiencia.</p>
            </div>
            <div>
              <div>
                <label>Elegí tu color favorito para las butacas</label>
                <input type="color" />
              </div>

              <div>
                <label
                  >¿Cuántas entradas comprás en general? Min: 0 | Max: 10</label
                >
                <input type="range" min="0" max="10" />
              </div>

              <div>
                <label>Seleccioná tu género favorito</label>
                <select>
                  <option>Acción</option>
                  <option>Drama</option>
                  <option>Ciencia ficción</option>
                  <option>Terror</option>
                  <option>Comedia</option>
                  <option>Romance</option>
                </select>
              </div>

              <div class ="form-radio">
                <label>Elegí tu snack favorito</label>

                <input type="radio" name="snack" />
                <label>Pochoclo dulce</label>

                <input type="radio" name="snack" />
                <label>Pochoclo salado</label>

                <input type="radio" name="snack" />
                <label>Chocolate</label>

                <input type="radio" name="snack" />
                <label>Frutos secos</label>
              </div>
            </div>
          </div>

          <div>
            <button type="submit" class="btn-comprar">Regístrate</button>
          </div>
        </form>
      </div>

      <footer>
        <p>&copy; 2026 Cine Aurora - Todos los derechos reservados</p>
      </footer>
    </main>
  </body>
</html>
